<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />

    <!-- PWA: theme and background -->
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="background-color" content="#0D0D0D" />

    <!-- PWA: makes it installable as a standalone app on iOS and Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="VW Menu" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <!-- PWA manifest (Android, Desktop Chrome) -->
    <link rel="manifest" href="manifest.json" />

    <title>Nnewi Buka — Menu</title>

    <link rel="canonical" href="https://app.virtualwaitress.com" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── Splash Screen ─────────────────────────────────────────────────── -->
    <div id="splashScreen" class="splash-screen" aria-label="Loading menu">
      <div class="splash-content">

        <!-- Restaurant branding -->
        <div class="splash-header">
          <p class="splash-restaurant" id="splashRestaurant"></p>
          <p class="splash-tagline-text" id="splashTagline"></p>
        </div>

        <!-- Hero character -->
        <div class="splash-character-wrap">
          <img class="splash-character-img" id="splashAdaImg" src="images/splash-waitress.png" alt="" aria-hidden="true" />
        </div>

        <!-- Loading dots -->
        <div class="splash-dots" aria-hidden="true">
          <span class="splash-dot"></span>
          <span class="splash-dot"></span>
          <span class="splash-dot"></span>
        </div>

      </div>
    </div>

    <!-- ── Main App ─────────────────────────────────────────────────────── -->
    <div id="app">

      <!-- Cover page — full-screen, slides up when tapped -->
      <div id="coverPage" class="cover-page">
        <div class="cover-bg" id="coverBg"></div>
        <div class="cover-vignette"></div>

        <!-- Pain-point carousel — top of hero -->
        <div class="cover-hero-msg">
          <p class="cover-msg-line1" id="coverMsgLine1"></p>
          <p class="cover-msg-line2" id="coverMsgLine2"></p>
          <div class="cover-msg-dots">
            <span class="cover-msg-dot active"></span>
            <span class="cover-msg-dot"></span>
            <span class="cover-msg-dot"></span>
          </div>
        </div>

        <div class="cover-content">
          <p class="cover-table-badge" id="coverTable">Table —</p>
          <div class="cover-text">
            <h1 class="cover-restaurant-name" id="coverRestaurantName">—</h1>
            <p class="cover-tagline" id="coverTagline"></p>
          </div>
          <!-- Character selection -->
          <div class="cover-char-section">
            <p class="cover-char-label">Your waiter tonight</p>
            <div class="cover-char-row" id="coverCharRow"></div>
          </div>

          <button class="cover-cta" id="coverCta">
            <span>&#127869;&#65039;</span>
            <span>Open Menu</span>
          </button>
          <p class="cover-hint">Scroll to browse &middot; Tap + to order</p>
        </div>
      </div>

      <!-- Compact sticky header (revealed after cover dismissed) -->
      <header id="magHeader" class="mag-header mag-header-hidden">
        <div class="mag-header-left">
          <span class="mag-header-name" id="magRestaurantName">—</span>
          <span class="mag-header-table" id="magTableBadge">Table —</span>
        </div>
        <div class="mag-header-right">
          <a href="/admin" class="mag-header-signin">Sign In</a>
          <button class="mag-header-menu-btn" id="magMenuBtn" aria-label="Open menu">&#9776;</button>
        </div>
      </header>

      <!-- Category pill nav -->
      <nav id="magNav" class="mag-nav mag-nav-hidden" aria-label="Menu categories">
        <div class="mag-nav-inner" id="magNavInner"></div>
      </nav>

      <!-- Magazine content — all categories as scrolling sections -->
      <main id="magContent" class="mag-content">
        <div class="loading">Loading menu…</div>
      </main>

      <!-- Ada character -->
      <div class="ada-container" id="adaContainer">
        <div
          class="speech-bubble"
          id="speechBubble"
          role="status"
          aria-live="polite"
        >
          <p id="speechText"></p>
        </div>
        <button
          class="ada-character"
          id="adaCharacter"
          aria-label="Chat with Ada, your virtual waitress"
        >
          <img src="images/ada.png" alt="Ada" class="ada-img" id="adaImg" />
        </button>
      </div>

      <!-- Order summary — appears once an item is added -->
      <div class="order-summary-bar" id="orderSummaryBar">
        <span id="orderItemCount">0 items</span>
        <span id="orderTotal">₦0</span>
      </div>

      <!-- Action bar: Call Waiter + Place Order -->
      <div class="action-bar">
        <button class="call-waiter-btn" id="callWaiterBtn">
          <span class="btn-icon">📲</span>
          <span>Call Waiter</span>
        </button>
        <button class="place-order-btn" id="placeOrderBtn">
          <span class="place-order-badge" id="placeOrderBadge">0</span>
          <span class="place-order-main">🛒 Place Order</span>
          <span class="place-order-sub">and get served</span>
        </button>
      </div>
      <!-- Powered by VW — free plan only, hidden for Growth/Pro -->
      <div id="vwPoweredBadge" class="vw-powered-badge vw-badge-hidden">
        <a href="https://virtualwaitress.com?ref=powered" target="_blank" rel="noopener" class="vw-powered-link">
          Powered by <strong>Virtual Waitress</strong>
        </a>
      </div>

    </div>
    <!-- /#app -->

    <!-- Customer side menu -->
    <div id="customerMenuOverlay" class="cmenu-overlay admin-hidden"></div>
    <nav
      id="customerMenuPanel"
      class="cmenu-panel admin-hidden"
      aria-label="Customer menu"
    >
      <div class="cmenu-header">
        <div class="cmenu-restaurant">
          <p class="cmenu-restaurant-name" id="cmenuRestaurantName">—</p>
          <p class="cmenu-table-label" id="cmenuTableLabel">Table —</p>
        </div>
        <button
          id="customerMenuCloseBtn"
          class="cmenu-close"
          aria-label="Close menu"
        >
          ✕
        </button>
      </div>
      <div class="cmenu-body">
        <button class="cmenu-item" id="cmenuMyOrdersBtn">
          <span class="cmenu-item-icon">📋</span>
          <span class="cmenu-item-label">My Orders</span>
          <span class="cmenu-item-arrow">›</span>
        </button>
        <button class="cmenu-item" id="cmenuCallWaiterBtn">
          <span class="cmenu-item-icon">📲</span>
          <span class="cmenu-item-label">Call Waiter</span>
          <span class="cmenu-item-arrow">›</span>
        </button>
      </div>
      <p class="cmenu-footer">Powered by Virtual Waitress</p>
    </nav>

    <!-- My Order modal -->
    <div id="myOrderModal" class="my-order-overlay admin-hidden">
      <div class="my-order-card">
        <div class="my-order-header">
          <div class="my-order-header-left">
            <span class="my-order-title">My Orders</span>
            <span class="my-order-table-pill"
              >Table <span id="myOrderTableNum"></span
            ></span>
          </div>
          <div class="my-order-header-right">
            <button
              id="myOrderRefreshBtn"
              class="my-order-refresh-icon"
              type="button"
              title="Refresh"
            >
              ↻
            </button>
            <button id="myOrderCloseBtn" class="my-order-close" type="button">
              ✕
            </button>
          </div>
        </div>
        <div id="myOrderContent">
          <p class="my-order-empty">Loading…</p>
        </div>
      </div>
    </div>

    <script src="js/vendor/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
