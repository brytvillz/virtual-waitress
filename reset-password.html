<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Virtual Waitress — Reset Password</title>
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/waiter.css" />
  </head>
  <body>

    <!-- Waiting for recovery token -->
    <section id="loadingScreen" class="login-screen">
      <div class="login-card">
        <h1>Reset Password</h1>
        <p class="login-sub">Verifying your reset link…</p>
        <p id="linkErrorMsg" class="login-error admin-hidden">
          This link is invalid or has expired. Request a new one from the login page.
        </p>
        <a href="https://dashboard.virtualwaitress.com/login" class="logout-btn admin-hidden" id="backToLoginLink">Back to Login</a>
      </div>
    </section>

    <!-- Password form (shown after recovery event fires) -->
    <section id="resetFormScreen" class="login-screen admin-hidden">
      <form id="resetForm" class="login-card">
        <h1>New Password</h1>
        <p class="login-sub">Choose a strong password for your account.</p>

        <div class="rp-pw-wrap">
          <input type="password" id="newPassword" placeholder="New password" autocomplete="new-password" required />
          <button type="button" class="rp-pw-toggle" id="rpPwToggle" aria-label="Show password">
            <svg class="rp-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="rp-eye-off rp-eye-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>

        <ul class="rp-strength" id="rpStrength" aria-live="polite">
          <li id="rp-len">8+ characters</li>
          <li id="rp-upper">Uppercase letter (A–Z)</li>
          <li id="rp-lower">Lowercase letter (a–z)</li>
          <li id="rp-num">Number (0–9)</li>
        </ul>

        <div class="rp-pw-wrap">
          <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" required />
          <button type="button" class="rp-pw-toggle" id="rpPwToggle2" aria-label="Show password">
            <svg class="rp-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="rp-eye-off rp-eye-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>

        <button type="submit" id="resetSubmitBtn">Update Password</button>
        <p id="resetError" class="login-error"></p>
      </form>
    </section>

    <script src="js/vendor/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/reset-password.js"></script>
  </body>
</html>
